name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare release artifacts
        run: |
          # Copy CLI entry point to root for easier access
          cp dist/cli/index.js dist/auto-review.js
          # Remove source maps and declaration files
          rm -f dist/*.map dist/*.d.ts dist/*.d.ts.map

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            dist/
            package.json
            package-lock.json
            README.md
            README-zh.md
            LICENSE

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to NPM
        run: npm publish --provenance --access public --ignore-scripts

  publish-github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          body: |
            ## 🚀 AutoReview v1.0.0 - 首次发布

            Frontend 性能测试和分析 CLI 工具，专为 AI Agent 和开发者设计。

            ### 主要功能

            - **Core Web Vitals** - LCP, FID, CLS, INP, TTFB 测量
            - **FPS 监控** - 实时帧率和卡顿检测
            - **内存分析** - 堆快照和内存泄漏检测
            - **JS 性能** - CPU 性能分析和函数执行分析
            - **Lighthouse 集成** - 全面的性能审计
            - **Trace 分析** - Chrome DevTools trace 文件分析和问题检测
            - **AI 友好输出** - JSON 格式优化，便于 LLM 分析

            ### 快速开始

            ```bash
            # 安装
            npm install

            # 构建
            npm run build

            # 运行全面检查
            node ./dist/cli/index.js check https://example.com
            ```

            ### 输出目录

            默认输出目录: `tests/`

            ```bash
            # 保存结果
            node ./dist/cli/index.js check https://example.com -o tests/result.json
            ```

            ### 更多信息

            详见 [README.md](./README.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [publish-npm, publish-github-release]
    runs-on: ubuntu-latest
    steps:
      - name: Success Notification
        run: |
          echo "✅ Release completed successfully!"
          echo "📦 NPM package published"
          echo "🏷️ GitHub Release created"
